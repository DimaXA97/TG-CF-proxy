services:
  TG-CF-proxy:
    image: tg-cf-proxy:1.4
    container_name: tg-cf-proxy
    ports:
      - "1080:1080"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    command: --host 0.0.0.0 --port 1080 --cf-domain virkgj.com
    init: true
    restart: always
    environment:
      - TZ=Europe/Moscow
      - BIND_ADDR=0.0.0.0
      - BIND_PORT=1080
      - TINI_SUBREAPER=1
